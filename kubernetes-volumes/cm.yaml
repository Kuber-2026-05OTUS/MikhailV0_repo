---

apiVersion: v1
kind: ConfigMap
metadata:
  name: homework-config
  namespace: homework
  labels:
    app: homework
data:
  nginx.conf: |
    server {
        listen 8000;
        root /homework;
        index index.html;

        location /conf/ {
            alias /homework/conf/;
            default_type text/plain;
        }
    }
  file: |
    app.name=homework
    app.version=1.0.0
    app.environment=production
  log-level: info
  max-connections: "1024"
