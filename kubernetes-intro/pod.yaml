---
apiVersion: v1
kind: Pod
metadata:
  name: homework-web
  namespace: homework
  labels:
    app: homework
    component: web
spec:
  volumes:
    - name: homework-volume
      emptyDir: {}

  initContainers:
    - name: init-downloader
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - wget -O /init/index.html http://example.com
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      volumeMounts:
        - name: homework-volume
          mountPath: /init

  containers:
    - name: web-server
      image: nginx:1.31.1-alpine
      command: ["sh", "-c"]
      args:
        - |
          cat > /etc/nginx/conf.d/default.conf <<'EOF'
          server {
              listen 8000;
              root /homework;
              index index.html;
          }
          EOF
          nginx -g 'daemon off;'
      ports:
        - containerPort: 8000
      startupProbe:
        httpGet:
          path: /index.html
          port: 8000
        initialDelaySeconds: 2
        periodSeconds: 3
        failureThreshold: 10
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
      volumeMounts:
        - name: homework-volume
          mountPath: /homework
      lifecycle:
        preStop:
          exec:
            command:
              - rm
              - -f
              - /homework/index.html
